name: Daily AI Research

on:
  schedule:
    # 13:30 UTC = 8:30 AM Bogota, Mon-Fri
    - cron: '30 13 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_research.py

      - name: Commit and push
        run: |
          git config user.name "ai-vault-researcher"
          git config user.email "bot@ai-vault.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily research $(date -u +%Y-%m-%d)"
            git push
          fi
