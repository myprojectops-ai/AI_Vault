name: Daily AI Research

# STAND-BY 2026-04-21: cron schedule removed because Sebastian prefers to wait
# for claude.ai scheduled agents to support WebFetch (see trig_011kNM3YzqXqjNwmDvd7Vozy,
# disabled). Workflow still runnable via `workflow_dispatch` if someone wants to
# re-activate manually. To re-enable daily runs, uncomment the schedule block.
on:
  # schedule:
  #   - cron: '30 13 * * 1-5'  # 8:30 AM Bogota, Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_research.py

      - name: Commit and push
        run: |
          git config user.name "ai-vault-researcher"
          git config user.email "bot@ai-vault.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily research $(date -u +%Y-%m-%d)"
            git push
          fi
